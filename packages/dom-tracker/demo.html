<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>@monit/dom-tracker — 演示</title>

  <!-- 加载真实打包产物 dist/index.browser.global.js -->
  <!-- 提供 window.DomTracker：createDomTracker / setDomMetadata / createOverlay / showOverlay / hideOverlay -->
  <script src="./dist/index.browser.global.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e5e7eb;
      min-height: 100vh;
    }

    .header {
      background: #16181e;
      border-bottom: 1px solid #2d2f36;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header h1 { margin: 0; font-size: 18px; color: #f9fafb; }
    .badge { background: #10b981; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 600; }
    .hint { margin-left: auto; font-size: 13px; color: #6b7280; }

    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; flex-shrink: 0; }
    .status-dot.on { background: #10b981; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.4 } }

    .layout { display: flex; min-height: calc(100vh - 57px); }

    .sidebar {
      width: 260px; background: #16181e;
      border-right: 1px solid #2d2f36;
      padding: 20px; flex-shrink: 0;
    }
    .sidebar h3 { margin: 0 0 12px; font-size: 13px; text-transform: uppercase; letter-spacing: .08em; color: #6b7280; }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border: none; border-radius: 6px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: opacity .15s; width: 100%; justify-content: center; margin-bottom: 8px;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: #10b981; color: #fff; }
    .btn-ghost   { background: #1f2129; color: #d1d5db; }
    .btn-danger  { background: #ef4444; color: #fff; }

    .log-panel {
      margin-top: 16px; background: #0f1117;
      border: 1px solid #2d2f36; border-radius: 6px;
      padding: 10px; max-height: 260px; overflow-y: auto;
      font-size: 11px; font-family: 'Menlo','Monaco',monospace; line-height: 1.6;
    }
    .log-entry { color: #6b7280; }
    .log-entry.info    { color: #60a5fa; }
    .log-entry.success { color: #10b981; }
    .log-entry.warn    { color: #fbbf24; }
    .log-entry.error   { color: #f87171; }

    .main { flex: 1; padding: 32px; overflow-y: auto; }
    .section-title {
      font-size: 13px; font-weight: 600; color: #6b7280;
      text-transform: uppercase; letter-spacing: .08em; margin: 0 0 16px;
    }

    /* Cards */
    .cards { display: grid; grid-template-columns: repeat(auto-fill,minmax(220px,1fr)); gap: 16px; margin-bottom: 32px; }
    .card {
      background: #16181e; border: 1px solid #2d2f36;
      border-radius: 10px; padding: 18px;
      transition: border-color .2s; cursor: pointer; position: relative; overflow: hidden;
    }
    .card:hover { border-color: #4b5563; }
    .card.tracked { border-color: #10b981 !important; }
    .card.tracked::after { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:#10b981; }
    .card-icon  { font-size: 26px; margin-bottom: 10px; }
    .card-title { font-size: 14px; font-weight: 600; color: #f9fafb; margin-bottom: 4px; }
    .card-desc  { font-size: 12px; color: #6b7280; margin-bottom: 12px; line-height: 1.5; }
    .card-price { font-size: 15px; font-weight: 700; color: #10b981; }
    .card-api   { font-size: 11px; color: #374151; font-family: monospace; }

    /* Table */
    .table-wrap { background: #16181e; border: 1px solid #2d2f36; border-radius: 10px; overflow: hidden; margin-bottom: 32px; }
    .table-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid #2d2f36; }
    .table-header h4 { margin: 0; font-size: 14px; color: #f9fafb; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 10px 18px; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: #6b7280; border-bottom: 1px solid #2d2f36; background: #0f1117; }
    td { padding: 12px 18px; font-size: 13px; color: #d1d5db; border-bottom: 1px solid #1f2129; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1a1c24; }
    tr.tracked td:first-child { border-left: 3px solid #10b981; }

    .tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .tag-get    { background: #1d4ed820; color: #60a5fa; }
    .tag-post   { background: #16a34a20; color: #4ade80; }
    .tag-delete { background: #dc262620; color: #f87171; }

    /* Form */
    .form-section { background: #16181e; border: 1px solid #2d2f36; border-radius: 10px; padding: 24px; margin-bottom: 32px; }
    .form-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .form-row input, .form-row select {
      flex: 1; min-width: 140px;
      background: #0f1117; border: 1px solid #2d2f36;
      border-radius: 6px; padding: 8px 12px;
      color: #e5e7eb; font-size: 13px;
    }
    .form-row input:focus, .form-row select:focus { outline: none; border-color: #10b981; }

    /* API source badge on cards */
    .api-badge {
      display: none; position: absolute; top: 8px; right: 8px;
      background: #10b98120; color: #10b981; font-size: 10px;
      padding: 2px 6px; border-radius: 4px; font-family: monospace;
    }
    .card.tracked .api-badge { display: block; }
  </style>
</head>
<body>

<div class="header">
  <div class="status-dot" id="statusDot"></div>
  <h1>@monit/dom-tracker</h1>
  <span class="badge">DEMO</span>
  <span class="hint">绿色边框 = 已绑定元数据，悬停查看数据来源</span>
</div>

<div class="layout">
  <div class="sidebar">
    <h3>控制</h3>
    <button class="btn btn-primary" onclick="initTracker()">▶ 启动 DomTracker</button>
    <button class="btn btn-ghost"   onclick="mockAllRequests()">⚡ 模拟 API 请求</button>
    <button class="btn btn-danger"  onclick="destroyTracker()">✕ 销毁</button>

    <h3 style="margin-top:20px">日志</h3>
    <div class="log-panel" id="logPanel"></div>
  </div>

  <div class="main">

    <p class="section-title">商品列表</p>
    <div class="cards" id="cardContainer"></div>

    <div class="table-wrap">
      <div class="table-header">
        <h4>订单列表</h4>
        <button class="btn btn-ghost" style="width:auto;margin:0" onclick="loadOrders()">刷新</button>
      </div>
      <table>
        <thead><tr><th>订单号</th><th>商品</th><th>状态</th><th>金额</th><th>接口</th></tr></thead>
        <tbody id="orderBody"><tr><td colspan="5" style="text-align:center;color:#4b5563">点击「刷新」加载</td></tr></tbody>
      </table>
    </div>

    <div class="form-section" id="formSection">
      <p class="section-title" style="margin-top:0">筛选 / 搜索</p>
      <div class="form-row">
        <input  id="searchInput"   placeholder="搜索商品…"  oninput="onSearch(this)" />
        <select id="categorySelect" onchange="onCategory(this)">
          <option value="">全部分类</option>
          <option value="electronics">电子产品</option>
          <option value="clothing">服装</option>
          <option value="food">食品</option>
        </select>
        <button class="btn btn-primary" style="width:auto;margin:0" onclick="onSubmit()">搜索</button>
      </div>
      <div id="searchResult" style="font-size:13px;color:#6b7280;margin-top:8px;min-height:18px"></div>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// 从 window.DomTracker 取出真实打包函数
// ─────────────────────────────────────────────────────────────
const {
  createDomTracker,
  setDomMetadata,
  getDomMetadata,
  createOverlay,
  showOverlay,
  hideOverlay,
  setupAxiosInterceptor,
} = window.DomTracker;

// ─── 工具日志 ────────────────────────────────────────────────
function log(level, msg) {
  const panel = document.getElementById('logPanel');
  const t = new Date().toLocaleTimeString('zh-CN', { hour12: false });
  const div = document.createElement('div');
  div.className = `log-entry ${level}`;
  div.textContent = `${t}  ${msg}`;
  panel.insertBefore(div, panel.firstChild);
  if (panel.children.length > 60) panel.removeChild(panel.lastChild);
}

// ─── DomTracker 状态 ─────────────────────────────────────────
let teardown = null;

function initTracker() {
  if (teardown) { log('warn', '已经启动'); return; }

  // process.env.NODE_ENV 在 browser bundle 里已被 replace 为 'development'
  teardown = createDomTracker({ enabled: true, showComponentStack: true });

  if (!teardown) {
    log('error', 'createDomTracker 返回 undefined（环境检查未通过）');
    return;
  }

  document.getElementById('statusDot').classList.add('on');
  log('success', '✓ @monit/dom-tracker 已启动（使用真实 createDomTracker）');
}

function destroyTracker() {
  if (!teardown) { log('warn', '未启动'); return; }
  teardown();
  teardown = null;
  document.getElementById('statusDot').classList.remove('on');
  document.querySelectorAll('.tracked').forEach(el => el.classList.remove('tracked'));
  log('warn', '已销毁');
}

// ─── 模拟 API 请求（用真实 setDomMetadata 写入元数据）────────
function fakeRequest(url, method, params, element, component, file, line) {
  return new Promise(resolve => {
    const delay = 80 + Math.random() * 400;
    setTimeout(() => {
      // 使用包里真实导出的 setDomMetadata 函数
      setDomMetadata(element, {
        apiSource : { url, method: method.toLowerCase(), params, timestamp: Date.now() },
        jsSource  : { component, file, line, column: 4 },
        componentStack: buildStack(component),
      });
      element.classList.add('tracked');
      log('success', `✓ ${method} ${url}  →  <${element.tagName.toLowerCase()}#${element.id || element.className.split(' ')[0]}>`);
      resolve();
    }, delay);
  });
}

function buildStack(comp) {
  return {
    ProductCard    : ['ProductCard.onClick','EventBus.emit','ProductList.render','App.render'],
    OrderList      : ['OrderList.fetchOrders','DataProvider.load','OrderPage.mount'],
    SearchBar      : ['SearchBar.handleSubmit','Form.onSubmit','SearchPage.render'],
    CategoryFilter : ['CategoryFilter.onChange','FilterPanel.update','ProductPage.render'],
  }[comp] || ['Component.handler','EventBus.dispatch','App.render'];
}

// ─── Demo 数据 ───────────────────────────────────────────────
const PRODUCTS = [
  { id:1, icon:'📱', name:'iPhone 16 Pro',   desc:'旗舰智能手机',     price:'¥9,999',  api:'/api/products/1', comp:'ProductCard', file:'src/ProductCard.tsx', line:38 },
  { id:2, icon:'💻', name:'MacBook Air M3',  desc:'超薄高性能笔记本', price:'¥9,499',  api:'/api/products/2', comp:'ProductCard', file:'src/ProductCard.tsx', line:38 },
  { id:3, icon:'🎧', name:'AirPods Pro',     desc:'主动降噪无线耳机', price:'¥1,899',  api:'/api/products/3', comp:'ProductCard', file:'src/ProductCard.tsx', line:38 },
  { id:4, icon:'⌚', name:'Apple Watch',     desc:'高端运动手表',     price:'¥6,299',  api:'/api/products/4', comp:'ProductCard', file:'src/ProductCard.tsx', line:38 },
  { id:5, icon:'📷', name:'Sony A7 IV',      desc:'全画幅微单相机',   price:'¥17,999', api:'/api/products/5', comp:'ProductCard', file:'src/ProductCard.tsx', line:38 },
  { id:6, icon:'🖥️', name:'LG 4K 显示器',   desc:'27寸专业显示器',   price:'¥3,499',  api:'/api/products/6', comp:'ProductCard', file:'src/ProductCard.tsx', line:38 },
];

const ORDERS = [
  { id:'ORD-001', product:'iPhone 16 Pro',  status:'已完成', amount:'¥9,999',  api:'/api/orders/1', method:'GET',    comp:'OrderList', file:'src/OrderList.tsx', line:52 },
  { id:'ORD-002', product:'MacBook Air M3', status:'配送中', amount:'¥9,499',  api:'/api/orders/2', method:'GET',    comp:'OrderList', file:'src/OrderList.tsx', line:52 },
  { id:'ORD-003', product:'AirPods Pro',    status:'待支付', amount:'¥1,899',  api:'/api/orders/3', method:'POST',   comp:'OrderList', file:'src/OrderList.tsx', line:68 },
  { id:'ORD-004', product:'Sony A7 IV',     status:'已取消', amount:'¥17,999', api:'/api/orders/4', method:'DELETE', comp:'OrderList', file:'src/OrderList.tsx', line:81 },
];

// ─── 渲染 ────────────────────────────────────────────────────
function renderCards() {
  document.getElementById('cardContainer').innerHTML = PRODUCTS.map(p => `
    <div class="card" id="card-${p.id}" onclick="cardClick(${p.id})">
      <span class="api-badge">${p.api}</span>
      <div class="card-icon">${p.icon}</div>
      <div class="card-title">${p.name}</div>
      <div class="card-desc">${p.desc}</div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px">
        <span class="card-price">${p.price}</span>
        <span class="card-api">${p.api}</span>
      </div>
    </div>`).join('');
}

function renderOrders() {
  const statusColor = { '已完成':'#10b981','配送中':'#fbbf24','待支付':'#60a5fa','已取消':'#6b7280' };
  const tagCls = { GET:'tag-get', POST:'tag-post', DELETE:'tag-delete' };
  document.getElementById('orderBody').innerHTML = ORDERS.map((o,i) => `
    <tr id="order-${i}">
      <td style="font-family:monospace;color:#9ca3af">${o.id}</td>
      <td>${o.product}</td>
      <td><span style="color:${statusColor[o.status]}">${o.status}</span></td>
      <td style="font-weight:600">${o.amount}</td>
      <td>
        <span class="tag ${tagCls[o.method]}">${o.method}</span>
        <span style="font-size:11px;color:#4b5563;margin-left:6px;font-family:monospace">${o.api}</span>
      </td>
    </tr>`).join('');
}

// ─── 模拟所有请求 ─────────────────────────────────────────────
async function mockAllRequests() {
  if (!teardown) { log('warn', '请先启动 DomTracker'); return; }
  log('info', '开始模拟请求……');

  // 商品卡片
  PRODUCTS.forEach(p => {
    const el = document.getElementById(`card-${p.id}`);
    if (el) fakeRequest(p.api, 'GET', { id: p.id }, el, p.comp, p.file, p.line);
  });

  // 订单行（先渲染再绑定）
  renderOrders();
  await new Promise(r => setTimeout(r, 30));
  ORDERS.forEach((o, i) => {
    const el = document.getElementById(`order-${i}`);
    if (el) fakeRequest(o.api, o.method, null, el, o.comp, o.file, o.line);
  });

  // 筛选表单区域
  fakeRequest('/api/categories', 'GET', null,
    document.getElementById('formSection'), 'CategoryFilter', 'src/CategoryFilter.tsx', 12);
}

// ─── 事件处理 ─────────────────────────────────────────────────
function cardClick(id) {
  const el = document.getElementById(`card-${id}`);
  const p = PRODUCTS.find(x => x.id === id);
  fakeRequest(`${p.api}/detail`, 'GET', null, el, p.comp, p.file, p.line);
}

function loadOrders() {
  renderOrders();
  if (teardown) {
    setTimeout(() => {
      ORDERS.forEach((o, i) => {
        const el = document.getElementById(`order-${i}`);
        if (el) fakeRequest(o.api, o.method, null, el, o.comp, o.file, o.line);
      });
    }, 30);
  }
}

let _searchTimer;
function onSearch(input) {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => {
    document.getElementById('searchResult').textContent = `搜索中：「${input.value}」`;
    if (teardown)
      fakeRequest(`/api/search?q=${encodeURIComponent(input.value)}`, 'GET',
        { q: input.value }, input, 'SearchBar', 'src/SearchBar.tsx', 24);
  }, 400);
}

function onCategory(sel) {
  if (teardown)
    fakeRequest(`/api/products?category=${sel.value}`, 'GET',
      { category: sel.value }, sel, 'CategoryFilter', 'src/CategoryFilter.tsx', 17);
}

function onSubmit() {
  const q   = document.getElementById('searchInput').value;
  const cat = document.getElementById('categorySelect').value;
  document.getElementById('searchResult').textContent = `结果：${q || '全部'} / ${cat || '全部类型'}`;
  if (teardown)
    fakeRequest('/api/search', 'POST', { q, category: cat },
      document.getElementById('formSection'), 'SearchBar', 'src/SearchBar.tsx', 30);
}

// ─── 初始化页面 ───────────────────────────────────────────────
renderCards();
log('info', `已加载 window.DomTracker：${Object.keys(window.DomTracker).join(', ')}`);
log('info', '点击「▶ 启动 DomTracker」开始');
</script>

</body>
</html>
