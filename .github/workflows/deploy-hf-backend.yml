name: Deploy Backend to Hugging Face Spaces

on:
  push:
    branches: [master]
    paths:
      - 'platform/backend/**'
      - '.github/workflows/deploy-hf-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Upload backend folder to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          token = os.environ.get("HF_TOKEN", "")
          if not token:
              raise RuntimeError("HF_TOKEN secret is not set in GitHub repository secrets!")

          api = HfApi(token=token)
          api.upload_folder(
              folder_path="platform/backend",
              repo_id="huabuyu05100510/monitor-platform-backend",
              repo_type="space",
              commit_message=f"Deploy from GitHub Actions",
              ignore_patterns=["node_modules/**", "dist/**", "*.db", "uploads/**"],
          )
          print("✅ Successfully deployed to HF Space!")
          EOF
