name: Deploy Backend to Hugging Face Spaces

on:
  push:
    branches: [master]
    paths:
      - 'platform/backend/**'
      - '.github/workflows/deploy-hf-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push backend to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd platform/backend
          git init -b main
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add .
          git commit -m "Deploy from GitHub $(git -C ../.. rev-parse --short HEAD)"
          git push --force \
            https://huabuyu05100510:${HF_TOKEN}@huggingface.co/spaces/huabuyu05100510/monitor-platform-backend \
            main
