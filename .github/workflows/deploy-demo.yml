name: Deploy React Demo to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'demos/react-demo/**'
      - 'packages/**'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build SDK packages
        run: pnpm --filter "./packages/**" build

      - name: Build React demo
        working-directory: demos/react-demo
        run: pnpm build
        env:
          VITE_BASE: /monitor-sdk/
          VITE_DSN: ${{ secrets.VITE_DSN }}

      - name: Save source maps as artifact (for local backend upload)
        uses: actions/upload-artifact@v4
        with:
          name: sourcemaps-${{ github.sha }}
          path: demos/react-demo/dist/assets/*.map
          retention-days: 30

      - name: Remove source maps from deployment
        run: find demos/react-demo/dist -name "*.map" -delete

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demos/react-demo/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
