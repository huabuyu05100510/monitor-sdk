name: Deploy React Demo to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'demos/react-demo/**'
      - 'packages/**'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

permissions:
  contents: write   # needed to commit source maps back to repo
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build SDK packages
        run: pnpm --filter "./packages/**" build

      - name: Build React demo
        working-directory: demos/react-demo
        run: pnpm build
        env:
          VITE_BASE: /monitor-sdk/
          # VITE_DSN is intentionally NOT embedded — configured at runtime via localStorage UI.

      # ── Commit source maps to repo so local backend can read them after git pull ──
      - name: Commit source maps to repo
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          MAPS_DIR="platform/backend/uploads/sourcemaps/react-demo"

          # Copy maps into backend uploads directory (versioned + latest alias)
          mkdir -p "${MAPS_DIR}/${SHORT_SHA}"
          mkdir -p "${MAPS_DIR}/latest"
          cp demos/react-demo/dist/assets/*.map "${MAPS_DIR}/${SHORT_SHA}/"
          cp demos/react-demo/dist/assets/*.map "${MAPS_DIR}/latest/"

          # Configure git
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${MAPS_DIR}/${SHORT_SHA}/" "${MAPS_DIR}/latest/"

          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "Source maps unchanged, skipping commit."
          else
            git commit -m "ci: update source maps for react-demo@${SHORT_SHA} [skip ci]"
            git push
          fi

      # Remove maps from the Pages artifact (never expose them publicly)
      - name: Remove source maps from deployment
        run: find demos/react-demo/dist -name "*.map" -delete

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demos/react-demo/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
