name: Deploy React Demo to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'demos/react-demo/**'
      - 'packages/**'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── Job 1: build, commit source maps, produce Pages artifact ───────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit source maps back to the repo

    outputs:
      sha: ${{ steps.meta.outputs.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch full history so git push doesn't fail on fast-forward check
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build SDK packages
        run: pnpm --filter "./packages/**" build

      - name: Build React demo
        working-directory: demos/react-demo
        run: pnpm build
        env:
          VITE_BASE: /monitor-sdk/
          # VITE_DSN is intentionally NOT embedded — configured at runtime via localStorage UI.

      - name: Capture commit meta
        id: meta
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Commit source maps to repo
        run: |
          SHORT_SHA="${{ steps.meta.outputs.sha }}"
          MAPS_DIR="platform/backend/uploads/sourcemaps/react-demo"

          mkdir -p "${MAPS_DIR}/${SHORT_SHA}"
          mkdir -p "${MAPS_DIR}/latest"
          cp demos/react-demo/dist/assets/*.map "${MAPS_DIR}/${SHORT_SHA}/"
          cp demos/react-demo/dist/assets/*.map "${MAPS_DIR}/latest/"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${MAPS_DIR}/${SHORT_SHA}/" "${MAPS_DIR}/latest/"

          if git diff --cached --quiet; then
            echo "Source maps unchanged, skipping commit."
          else
            git commit -m "ci: update source maps for react-demo@${SHORT_SHA} [skip ci]"
            # Pull + rebase in case another commit landed between checkout and push
            git pull --rebase origin master
            git push origin master
          fi

      - name: Remove source maps from Pages deployment
        run: find demos/react-demo/dist -name "*.map" -delete

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demos/react-demo/dist

  # ── Job 2: deploy to GitHub Pages (separate permissions scope) ─────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
