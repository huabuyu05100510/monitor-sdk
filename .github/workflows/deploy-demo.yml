name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'demos/react-demo/**'
      - 'platform/frontend/**'
      - 'packages/**'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build SDK packages
        run: pnpm --filter "@monit/*" build

      # ── React Demo → /monitor-sdk/ ──────────────────────────────────────────
      - name: Build React demo
        run: pnpm --filter react-demo build
        env:
          VITE_BASE: /monitor-sdk/
          VITE_DSN: ${{ secrets.VITE_DSN }}

      # ── Monitor Platform Frontend → /monitor-sdk/platform/ ──────────────────
      - name: Build platform frontend
        run: pnpm --filter @monit/platform-frontend build
        env:
          VITE_BASE: /monitor-sdk/platform/
          # Users can override this with their backend URL (set VITE_API_BASE secret)
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}

      # ── Merge both into one artifact ────────────────────────────────────────
      - name: Assemble Pages artifact
        run: |
          mkdir -p gh-pages/platform
          cp -r demos/react-demo/dist/. gh-pages/
          cp -r platform/frontend/dist/. gh-pages/platform/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
